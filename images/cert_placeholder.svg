<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 200" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b0826;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#140e36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#6366f1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="goldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d97706;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="300" height="200" rx="8" fill="url(#bgGrad)" />
  <rect width="298" height="198" x="1" y="1" rx="7" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.3" />
  
  <!-- Certificate Border Design -->
  <rect width="270" height="170" x="15" y="15" rx="4" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" stroke-dasharray="6,4" opacity="0.5" />
  
  <!-- Ribbon Badge -->
  <g transform="translate(150, 85)">
    <!-- Ribbon tails -->
    <path d="M-15 15 L-25 45 L-10 40 L5 45 L-5 15 Z" fill="#6366f1" opacity="0.8" />
    <path d="M15 15 L25 45 L10 40 L-5 45 L5 15 Z" fill="#a855f7" opacity="0.8" />
    
    <!-- Central gold seal -->
    <circle cx="0" cy="0" r="28" fill="url(#goldGrad)" />
    <circle cx="0" cy="0" r="23" fill="none" stroke="#ffffff" stroke-width="1" opacity="0.5" />
    
    <!-- Star in seal -->
    <polygon points="0,-12 3,-3 12,-3 5,3 8,12 0,6 -8,12 -5,3 -12,-3 -3,-3" fill="#ffffff" />
  </g>
  
  <text x="150" y="155" fill="#e2e8f0" font-family="Outfit, sans-serif" font-size="12" font-weight="bold" text-anchor="middle" letter-spacing="1.5">VERIFIED CREDENTIAL</text>
</svg>
