<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 250" width="100%" height="100%">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0b062b;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#140e36;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="400" height="250" rx="12" fill="url(#bgGrad)" />
  <rect width="398" height="248" x="1" y="1" rx="11" fill="none" stroke="url(#accentGrad)" stroke-width="1.5" opacity="0.4" />
  
  <!-- Browser Header Mockup -->
  <rect width="400" height="30" rx="12" fill="#0c0721" opacity="0.8" />
  <circle cx="20" cy="15" r="4" fill="#ef4444" />
  <circle cx="32" cy="15" r="4" fill="#eab308" />
  <circle cx="44" cy="15" r="4" fill="#22c55e" />
  
  <!-- Code/Tech Graphic -->
  <path d="M120 110 L95 135 L120 160" fill="none" stroke="#06b6d4" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <path d="M280 110 L305 135 L280 160" fill="none" stroke="#a855f7" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />
  <line x1="210" y1="100" x2="190" y2="170" stroke="#6366f1" stroke-width="4" stroke-linecap="round" />
  
  <text x="200" y="210" fill="#a5b4fc" font-family="Outfit, sans-serif" font-size="16" font-weight="bold" text-anchor="middle" letter-spacing="1">PROJECT SHOWCASE</text>
</svg>
