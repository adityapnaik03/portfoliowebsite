      // ==========================================
      // PARTICLES BACKGROUND CANVAS
      // ==========================================
      function ParticleBackground({ theme }) {
        const canvasRef = useRef(null);

        useEffect(() => {
          const canvas = canvasRef.current;
          if (!canvas) return;
          const ctx = canvas.getContext('2d');
          if (!ctx) return;

          let animationFrameId;
          let particles = [];
          const particleCount = window.innerWidth < 768 ? 30 : 70;
          const connectionDistance = 100;

          const resizeCanvas = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
          };

          window.addEventListener('resize', resizeCanvas);
          resizeCanvas();

          const colors = theme === 'dark' 
            ? ['rgba(99, 102, 241, 0.45)', 'rgba(168, 85, 247, 0.45)', 'rgba(6, 182, 212, 0.45)']
            : ['rgba(99, 102, 241, 0.15)', 'rgba(168, 85, 247, 0.15)', 'rgba(6, 182, 212, 0.15)'];

          for (let i = 0; i < particleCount; i++) {
            particles.push({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              vx: (Math.random() - 0.5) * 0.4,
              vy: (Math.random() - 0.5) * 0.4,
              size: Math.random() * 2 + 1,
              color: colors[Math.floor(Math.random() * colors.length)],
            });
          }

          const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles.forEach((p) => {
              p.x += p.vx;
              p.y += p.vy;
              if (p.x < 0 || p.x > canvas.width) p.vx *= -1;
              if (p.y < 0 || p.y > canvas.height) p.vy *= -1;

              ctx.beginPath();
              ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
              ctx.fillStyle = p.color;
              ctx.fill();
            });

            const lineColor = theme === 'dark' ? 'rgba(99, 102, 241, 0.03)' : 'rgba(99, 102, 241, 0.05)';
            for (let i = 0; i < particles.length; i++) {
              for (let j = i + 1; j < particles.length; j++) {
                const dx = particles[i].x - particles[j].x;
                const dy = particles[i].y - particles[j].y;
                const dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < connectionDistance) {
                  ctx.beginPath();
                  ctx.moveTo(particles[i].x, particles[i].y);
                  ctx.lineTo(particles[j].x, particles[j].y);
                  ctx.strokeStyle = lineColor;
                  ctx.lineWidth = 0.8 * (1 - dist / connectionDistance);
                  ctx.stroke();
                }
              }
            }
            animationFrameId = requestAnimationFrame(animate);
          };

          animate();
          return () => {
            window.removeEventListener('resize', resizeCanvas);
            cancelAnimationFrame(animationFrameId);
          };
        }, [theme]);

        return (
          <canvas
            ref={canvasRef}
            className="fixed inset-0 pointer-events-none z-0"
            style={{ mixBlendMode: theme === 'dark' ? 'screen' : 'multiply' }}
          />
        );
      }

      // ==========================================
      // INTERACTIVE MOUSE CURSOR (Desktop Only)
      // ==========================================
      function CustomCursor() {
        const [pos, setPos] = useState({ x: 0, y: 0 });
        const [trail, setTrail] = useState({ x: 0, y: 0 });
        const [isHover, setIsHover] = useState(false);
        const [visible, setVisible] = useState(false);
        const requestRef = useRef(null);

        useEffect(() => {
          const isTouch = 'ontouchstart' in window || navigator.maxTouchPoints > 0;
          if (isTouch) return;

          setVisible(true);
          document.body.classList.add('custom-cursor-active');

          const move = (e) => setPos({ x: e.clientX, y: e.clientY });
          const leave = () => setVisible(false);
          const enter = () => setVisible(true);

          window.addEventListener('mousemove', move);
          document.addEventListener('mouseleave', leave);
          document.addEventListener('mouseenter', enter);

          const listenHover = () => {
            document.querySelectorAll('a, button, input, textarea, .hover-glow').forEach(el => {
              el.addEventListener('mouseenter', () => setIsHover(true));
              el.addEventListener('mouseleave', () => setIsHover(false));
            });
          };
          listenHover();
          const interval = setInterval(listenHover, 1500);

          return () => {
            window.removeEventListener('mousemove', move);
            document.removeEventListener('mouseleave', leave);
            document.removeEventListener('mouseenter', enter);
            document.body.classList.remove('custom-cursor-active');
            clearInterval(interval);
          };
        }, []);

        useEffect(() => {
          const loop = () => {
            setTrail(prev => {
              const dx = pos.x - prev.x;
              const dy = pos.y - prev.y;
              return { x: prev.x + dx * 0.15, y: prev.y + dy * 0.15 };
            });
            requestRef.current = requestAnimationFrame(loop);
          };
          requestRef.current = requestAnimationFrame(loop);
          return () => cancelAnimationFrame(requestRef.current);
        }, [pos]);

        if (!visible) return null;

        return (
          <React.Fragment>
            <div
              className="fixed w-2.5 h-2.5 bg-cyan-400 rounded-full pointer-events-none z-[9999] -translate-x-1/2 -translate-y-1/2 mix-blend-difference transition-transform duration-100"
              style={{ left: `${pos.x}px`, top: `${pos.y}px`, transform: `translate(-50%, -50%) scale(${isHover ? 2.5 : 1})` }}
            />
            <div
              className="fixed w-9 h-9 border border-indigo-400 rounded-full pointer-events-none z-[9998] -translate-x-1/2 -translate-y-1/2 transition-all duration-200"
              style={{
                left: `${trail.x}px`,
                top: `${trail.y}px`,
                transform: `translate(-50%, -50%) scale(${isHover ? 1.7 : 1})`,
                borderColor: isHover ? '#a855f7' : 'rgba(99, 102, 241, 0.7)',
                backgroundColor: isHover ? 'rgba(168, 85, 247, 0.1)' : 'transparent'
              }}
            />
          </React.Fragment>
        );
      }

      // ==========================================
      // ABOUT ME SCROLL COUNTER
      // ==========================================
      function AboutCounter({ icon, title, endVal, suffix = '' }) {
        const [val, setVal] = useState(0);
        const ref = useRef(null);

        useEffect(() => {
          const observer = new IntersectionObserver((entries) => {
            if (entries[0].isIntersecting) {
              let start = 0;
              const step = endVal / 100;
              const timer = setInterval(() => {
                start += step;
                if (start >= endVal) {
                  setVal(endVal);
                  clearInterval(timer);
                } else {
                  setVal(Math.floor(start));
                }
              }, 16);
              observer.disconnect();
            }
          }, { threshold: 0.1 });

          if (ref.current) observer.observe(ref.current);
          return () => observer.disconnect();
        }, [endVal]);

        return (
          <div ref={ref} className="p-5 rounded-2xl glass-card-light dark:glass-card-dark flex flex-col items-center shadow-md">
            <div className="w-10 h-10 rounded-xl bg-gradient-to-tr from-cyan-400 to-indigo-500 flex items-center justify-center text-white mb-3 shadow-neon-blue">
              {icon}
            </div>
            <span className="text-2xl font-bold text-slate-800 dark:text-white">{val}{suffix}</span>
            <span className="text-xs font-semibold text-slate-500 dark:text-slate-400 mt-1">{title}</span>

      // ==========================================

      function ProjectCard({ project }) {
        const cardRef = useRef(null);
        const [style, setStyle] = useState({});

        const move = (e) => {
          const card = cardRef.current;
          if (!card) return;
          const rect = card.getBoundingClientRect();
          const x = (e.clientX - rect.left) / rect.width - 0.5;
          const y = (e.clientY - rect.top) / rect.height - 0.5;
          setStyle({
            transform: `perspective(1000px) rotateX(${-y * 12}deg) rotateY(${x * 12}deg) scale3d(1.02, 1.02, 1.02)`,
            transition: 'transform 0.1s ease-out'
          });
        };

        const leave = () => {
          setStyle({
            transform: 'perspective(1000px) rotateX(0deg) rotateY(0deg) scale3d(1, 1, 1)',
            transition: 'transform 0.5s ease'
          });
        };

        return (
          <div
            ref={cardRef}
            onMouseMove={move}
            onMouseLeave={leave}
            style={style}
            className="rounded-2xl glass-card-light dark:glass-card-dark overflow-hidden shadow-lg flex flex-col h-full transition-shadow duration-300 hover:shadow-neon-blue/10"
          >
            <div className="relative h-44 w-full bg-slate-950 overflow-hidden">

                      <div className="mb-4">
                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Subject</label>
                        <input type="text" name="subject" value={contactForm.subject} onChange={handleFormChange} className={`w-full px-3 py-2 rounded-lg bg-slate-500/5 border text-xs text-slate-700 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-cyan-400 ${errors.subject ? 'border-red-500' : 'border-slate-200/10'}`} placeholder="Subject info" />
                        {errors.subject && <span className="text-[10px] text-red-500 mt-0.5 block">{errors.subject}</span>}
                      </div>
                      <div className="mb-4">
                        <label className="block text-[10px] font-bold text-slate-500 uppercase tracking-wider mb-1">Message</label>
                        <textarea name="message" rows="4" value={contactForm.message} onChange={handleFormChange} className={`w-full px-3 py-2 rounded-lg bg-slate-500/5 border text-xs text-slate-700 dark:text-slate-100 placeholder-slate-400 focus:outline-none focus:ring-1 focus:ring-cyan-400 ${errors.message ? 'border-red-500' : 'border-slate-200/10'}`} placeholder="Write message..." />
                        {errors.message && <span className="text-[10px] text-red-500 mt-0.5 block">{errors.message}</span>}
                      </div>
                      <button type="submit" disabled={isSubmitting} className="w-full py-2.5 rounded-lg bg-gradient-to-r from-cyan-500 to-indigo-600 text-white text-xs font-bold shadow-md hover:shadow-neon-blue flex items-center justify-center gap-1 hover:scale-[1.01] active:scale-[0.99] disabled:opacity-50 transition-all cursor-pointer">
                        {isSubmitting ? 'Sending...' : 'Send Message'}
                      </button>

                      {/* Success banner */}
                      {submitStatus === 'success' && (
                        <div className="absolute inset-0 bg-[#0a0620]/95 rounded-2xl flex flex-col items-center justify-center p-6 text-center z-20">
                          <Icon name="award" className="w-12 h-12 text-green-400 mb-3 animate-bounce" />
                          <h4 className="text-lg font-bold text-white mb-1">Message Sent!</h4>
                          <p className="text-[11px] text-slate-400 max-w-xs">Thank you for reaching out, Aditya will respond shortly!</p>
                        </div>
                      )}
                    </form>
                  </div>
                </div>
              </div>
            </section>

            {/* FOOTER */}
            <footer className="border-t border-slate-200/20 dark:border-white/10 glass-card-light dark:glass-card-dark py-10 relative overflow-hidden bg-transparent z-10">
              <div className="max-w-7xl mx-auto px-6 md:px-12 flex flex-col items-center gap-6">
                <div className="flex flex-wrap justify-center gap-4 text-xs font-semibold text-slate-500">
                  {['Home', 'About', 'Skills', 'Education', 'Projects', 'Certificates', 'Contact'].map(link => (
                    <a key={link} href={`#${link.toLowerCase()}`} className="hover:text-cyan-400">{link}</a>
                  ))}
                </div>
                <div className="flex items-center gap-4">
                  {[
                    { name: 'github', href: 'https://github.com/adityapnaik' },
                    { name: 'linkedin', href: 'https://linkedin.com/in/adityapnaik' },
                    { name: 'instagram', href: 'https://instagram.com/aditya.p.naik' },
                    { name: 'twitter', href: 'https://x.com/adityapnaik' }
                  ].map(s => (
                    <a key={s.name} href={s.href} target="_blank" rel="noopener noreferrer" className="w-8 h-8 rounded-full border border-slate-200 dark:border-white/10 flex items-center justify-center text-slate-500 hover:bg-gradient-to-tr hover:from-cyan-500 hover:to-indigo-500 hover:text-white hover:border-transparent transition-all duration-300">
                      <Icon name={s.name} className="w-4 h-4" />
                    </a>
                  ))}
                </div>
                <div className="w-full max-w-sm h-[1px] bg-slate-200/20 dark:bg-white/5" />
                <div className="text-center text-xs text-slate-500">
                  <p>© {new Date().getFullYear()} Aditya P Naik. All rights reserved.</p>
                  <p className="font-semibold text-slate-600 dark:text-slate-500 mt-0.5">
                    Designed & Developed by <span className="bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-indigo-500 font-bold">Aditya P Naik</span>
                  </p>
                </div>
              </div>
            </footer>
          </div>
        );
      }

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  </body>
</html>
